<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九步法审案系统</title>
<style>
:root{--bg:#f8f5f0;--card:#fff;--ink:#1a1d24;--ink2:#5a5e6a;--red:#9b2a23;--gold:#a8843f;--green:#4a6b53;--blue:#2c5282;--line:#e2dcd0;--warn:#e6a817;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06);}
*{box-sizing:border-box;margin:0;padding:0}
body{font:400 15px/1.6 -apple-system,"Noto Serif SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--line);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:22px;font-weight:700;letter-spacing:.05em}
header .badge{font-size:12px;padding:4px 10px;border-radius:12px;font-weight:600}
.badge-on{background:#e6f4ea;color:var(--green)}.badge-off{background:#fce8e6;color:var(--red)}.badge-busy{background:#fef7e0;color:var(--warn)}.badge-demo{background:#e8f0fe;color:var(--blue)}
main{max-width:1100px;margin:0 auto;padding:28px 24px}
.stage{display:none}.stage.active{display:block}
.progress{display:flex;gap:0;margin-bottom:32px;counter-reset:step}
.progress li{flex:1;text-align:center;list-style:none;position:relative;font-size:13px;color:var(--ink2);padding-top:28px}
.progress li::before{counter-increment:step;content:counter(step);position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:26px;border-radius:50%;background:var(--line);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--ink2)}
.progress li.done::before{background:var(--green);color:#fff;content:"✓"}
.progress li.active{color:var(--ink);font-weight:600}
.progress li.active::before{background:var(--ink);color:#fff}
.progress li.done{color:var(--green);cursor:pointer}.progress li.done:hover{color:#2d5a3d;text-decoration:underline}.progress li.active{cursor:default}
.progress li::after{content:"";position:absolute;top:12px;left:calc(50% + 18px);width:calc(100% - 36px);height:2px;background:var(--line)}
.progress li:last-child::after{display:none}
.progress li.done::after{background:var(--green)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px;border:1px solid var(--line)}
.card h2{font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.card h3{font-size:15px;font-weight:600;margin:12px 0 8px;color:var(--ink)}
textarea,input[type="text"],input[type="number"],select{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:6px;font:14px/1.5 inherit;background:var(--bg);transition:border-color .2s}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(168,132,63,.15)}
textarea{min-height:180px;resize:vertical}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:160px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:none;border-radius:6px;font:600 14px inherit;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--ink);color:#fff}.btn-primary:hover{background:#2c3140}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#8a6d32}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink)}.btn-outline:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:var(--ink2)}.btn-ghost:hover{color:var(--ink)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 14px;font-size:13px}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.tag-red{background:#fce8e6;color:var(--red)}.tag-green{background:#e6f4ea;color:var(--green)}.tag-yellow{background:#fef7e0;color:var(--warn)}.tag-blue{background:#e8f0fe;color:var(--blue)}
.gauge{text-align:center;padding:16px}.gauge-ring{position:relative;width:100px;height:100px;margin:0 auto}
.gauge-ring svg{transform:rotate(-90deg)}.gauge-ring .val{position:absolute;inset:0;display:grid;place-items:center;font-size:28px;font-weight:900}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.stat{background:var(--bg);padding:14px;border-radius:6px;text-align:center}.stat .n{font-size:24px;font-weight:700}.stat .l{font-size:12px;color:var(--ink2);margin-top:2px}
.accordion{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.accordion summary{padding:14px 18px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:10px;background:var(--bg);user-select:none}
.accordion summary:hover{background:#f0ece5}
.accordion .body{padding:18px;border-top:1px solid var(--line)}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.checklist-item:last-child{border-bottom:none}
.checklist-item .status-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700}
.s-ok{background:#e6f4ea;color:var(--green)}.s-partial{background:#fef7e0;color:var(--warn)}.s-missing{background:#fce8e6;color:var(--red)}
.error-bar{background:#fce8e6;color:var(--red);padding:12px 16px;border-radius:6px;font-size:14px;margin-bottom:12px;border-left:3px solid var(--red)}
.warn-bar{background:#fef7e0;color:#8a6d32;padding:12px 16px;border-radius:6px;font-size:14px;margin-bottom:12px;border-left:3px solid var(--warn)}
.info-bar{background:#e8f0fe;color:var(--blue);padding:12px 16px;border-radius:6px;font-size:14px;margin-bottom:12px;border-left:3px solid var(--blue)}
.sidebar{display:grid;grid-template-columns:1fr 280px;gap:20px}
.sidebar aside{position:sticky;top:100px;align-self:start}
.sidebar aside .card{max-height:70vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
th{font-weight:600;color:var(--ink2);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
tr:hover{background:var(--bg)}
.loading{text-align:center;padding:40px;color:var(--ink2)}.loading::after{content:"";display:inline-block;width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);max-width:600px;width:90%;max-height:80vh;overflow-y:auto;padding:28px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal h2{font-size:20px;margin-bottom:20px}
.modal .close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink2)}
.document-skeleton{font-family:"Noto Serif SC",serif;line-height:2}
.document-skeleton h3{font-size:17px;color:var(--red);text-align:center;margin:16px 0;font-weight:700}
.document-skeleton p{margin:8px 0;text-indent:2em}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:"";position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--line)}
.timeline-item{position:relative;margin-bottom:16px;padding-left:16px}
.timeline-item::before{content:"";position:absolute;left:-20px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--gold)}
.timeline-item .time{font-size:12px;color:var(--ink2)}
.field-preview{margin-bottom:10px}
.field-preview .key{font-size:12px;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.field-preview .val{font-size:14px;padding:6px 10px;background:var(--bg);border-radius:4px;margin-top:2px}
pre{background:var(--bg);padding:12px;border-radius:6px;font-size:13px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.fast-markdown{font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.8;white-space:pre-wrap;word-break:break-word;overflow-x:auto;font-size:14px}
.fast-markdown table{width:100%;border-collapse:collapse;font-size:14px;margin:12px 0}
.fast-markdown th{padding:8px 12px;border-bottom:2px solid var(--line);text-align:left;font-weight:600;color:var(--ink2);font-size:12px;background:var(--bg)}
.fast-markdown td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:left}
.fast-markdown tr:hover{background:var(--bg)}
.fast-markdown hr{margin:16px 0;border:none;border-top:1px solid var(--line)}
.fast-markdown h2{font-size:20px;font-weight:700;margin:24px 0 12px;color:var(--red)}
.fast-markdown h3{font-size:17px;font-weight:700;margin:20px 0 10px;color:var(--ink)}
.fast-markdown h4{font-size:15px;font-weight:700;margin:16px 0 8px;color:var(--blue)}
.fast-markdown strong{color:var(--ink)}
.fast-markdown ul, .fast-markdown ol{margin:8px 0;padding-left:20px}
.fast-markdown li{margin:4px 0}
</style>
</head>
<body>

<header>
  <h1>⚖ 九步法审案系统</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="demoStatus" style="display:none;font-size:13px;color:var(--blue);max-width:360px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></span>
    <span id="sysStatus" class="badge badge-busy">连接中…</span>
  </div>
</header>

<main>
  <!-- Progress indicator -->
  <ol class="progress" id="progress">
    <li class="active" data-stage="1">材料提交与审核</li>
    <li data-stage="2">九步法确认</li>
    <li data-stage="3">结果展示</li>
  </ol>

  <!-- ============ STAGE 1: Material ============ -->
  <div class="stage active" id="stage1">
    <div class="card">
      <h2>案件材料输入</h2>
      <textarea id="rawMaterial" placeholder="请在此输入您的案件材料，包括：案件事实、诉讼请求、证据材料、当事人信息等。&#10;&#10;支持口语化输入，系统将自动识别案件类型并规范化处理。&#10;&#10;示例：&#10;我是做小生意的，有个客户李某从我这买了混凝土，欠我8万块钱一直不给..."></textarea>
      <div class="row" style="margin-top:12px">
        <div><label>用户身份</label><select id="userRole"><option>原告</option><option>被告</option><option>第三人</option><option>代理人</option><option>其他</option></select></div>
        <div><label>案件类型</label><select id="caseType"><option value="">系统自动识别</option><option>合同纠纷</option><option>婚姻家庭</option><option>侵权纠纷</option><option>劳动争议</option><option>民间借贷</option><option>其他民事案件</option></select></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn btn-primary" id="btnSubmit" onclick="submitMaterial()">真实分析</button>
        <button class="btn btn-gold" id="btnFastMode" onclick="runFastMode()">⚡ 快速模式</button>
        <button class="btn btn-outline" onclick="loadSample()">加载示例</button>
        <button class="btn btn-outline" id="btnDemo" onclick="runDemo()" style="border-color:var(--blue);color:var(--blue)">▶ 示例 Demo</button>
      </div>
      <p style="font-size:12px;color:var(--ink2);margin-top:8px"><strong>真实分析：提交后后台异步执行，页面可安全关闭</strong>（约10-20分钟）&nbsp;&nbsp;|&nbsp;&nbsp;快速模式：单轮分析，约2-5分钟&nbsp;&nbsp;|&nbsp;&nbsp;示例 Demo：展示固定案例的完整运行效果，即时展示</p>
    </div>

    <div id="reviewResult" style="display:none">
      <!-- Populated after review -->
    </div>

    <div id="fastModeProgress" style="display:none" class="card loading">快速模式分析进行中，请耐心等候（约2-5分钟）…</div>
    <div id="fastModeResult" style="display:none"></div>
  </div>

  <!-- ============ STAGE 2: Jiubufa Confirm ============ -->
  <div class="stage" id="stage2">
    <div id="stage2Warn"></div>
    <div class="card">
      <h2>九步法输入预览</h2>
      <p style="color:var(--ink2);font-size:13px;margin-bottom:16px">以下为材料规范层生成的标准化案件数据，确认无误后提交九步法分析。</p>
      <div id="normalizedPreview"></div>
      <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
        <div style="flex:0 0 200px"><label>分析模型</label><select id="modelSelect"></select></div>
        <button class="btn btn-gold" id="btnJiubufa" onclick="runJiubufa()">开始九步法分析</button>
        <span id="stage2Status" style="font-size:13px;color:var(--ink2)"></span>
      </div>
    </div>
    <div id="jiubufaProgress" style="display:none" class="card"></div>
  </div>

  <!-- ============ STAGE 3: Results ============ -->
  <div class="stage" id="stage3">
    <div id="resultContent"></div>
  </div>

  <!-- Supplement Modal -->
  <div class="modal-overlay" id="supplementModal">
    <div class="modal">
      <button class="close" onclick="closeSupplement()">&times;</button>
      <h2>📋 材料补充提示</h2>
      <div id="supplementBody"></div>
    </div>
  </div>

<script>
const API = 'http://127.0.0.1:8000';
let materialResult = null;      // MaterialFullResult
let workflowResult = null;      // WorkflowResult
let currentStage = 1;
let reachedStage = 1;           // Farthest stage user has reached (clickable ceiling)

// ── Init ────────────────────────────
(async function init(){
  goStage(1); // init progress bar click handlers
  try{ const r=await fetch(API+'/api/health'); const d=await r.json();
    document.getElementById('sysStatus').textContent='系统就绪 · '+d.kb_size+'条法规';
    document.getElementById('sysStatus').className='badge badge-on';
    const sel=document.getElementById('modelSelect');
    for(const [k,v] of Object.entries(d.models||{})){ const o=document.createElement('option'); o.value=k; o.textContent=k+' ('+v+')'; if(k===d.default_model)o.selected=true; sel.appendChild(o); }
  }catch(e){ document.getElementById('sysStatus').textContent='服务离线'; document.getElementById('sysStatus').className='badge badge-off'; }
})();

// ── Stage navigation ────────────────
function goStage(n){
  if(n > reachedStage) return; // can't skip ahead
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  document.getElementById('stage'+n).classList.add('active');
  document.querySelectorAll('.progress li').forEach((li,i)=>{
    const sn = i+1;
    li.className = sn < n ? 'done' : sn === n ? 'active' : '';
    li.style.cursor = sn <= reachedStage ? 'pointer' : 'default';
    li.onclick = sn <= reachedStage ? (()=>goStage(sn)) : null;
    li.title = sn <= reachedStage ? '点击切换到第'+sn+'步' : '';
  });
  currentStage = n;
  window.scrollTo({top:0,behavior:'smooth'});
}
function advanceStage(){
  reachedStage = Math.max(reachedStage, currentStage + 1);
}

// ── Sample ──────────────────────────
function loadSample(){
  document.getElementById('rawMaterial').value = '我是做小生意的，有个客户李某从我这买了混凝土，欠我8万块钱一直不给。当时也没签什么正式合同，就是微信上说的，他说要买混凝土，我就给他送了。送了三次货，分别是去年9月20号、9月25号、9月27号。一开始他用个人微信给我转过一部分钱，后来就不给了。我有微信聊天记录，他说"你放心，我会付的"，但是一直拖着。我现在想起诉他，让他把8万货款付了。';
}

// ── Stage 1: Submit Material (Async Polling) ──
let pollingTimer = null;
async function submitMaterial(){
  const raw = document.getElementById('rawMaterial').value.trim();
  if(!raw) return alert('请输入案件材料');

  // Stop any existing polling
  if(pollingTimer){ clearInterval(pollingTimer); pollingTimer = null; }

  const btn = document.getElementById('btnSubmit');
  btn.textContent='提交中…'; btn.disabled=true;

  // Show progress bar
  const progressDiv = document.getElementById('jiubufaProgress');
  progressDiv.style.display='block';
  progressDiv.innerHTML = '<div class="loading">正在创建分析任务…</div>';

  try{
    const model = document.getElementById('modelSelect').value;
    const res = await fetch(API+'/api/case/start',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({raw_material: raw, model_name: model})
    });
    if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.detail||'HTTP '+res.status); }
    const data = await res.json();
    const taskId = data.task_id;

    // Start polling
    pollTask(taskId, btn);
  }catch(e){
    alert('任务提交失败: '+e.message);
    progressDiv.style.display='none';
    btn.textContent='提交审核'; btn.disabled=false;
  }
}

function pollTask(taskId, submitBtn){
  goStage(2);
  const progressDiv = document.getElementById('jiubufaProgress');
  progressDiv.style.display='block';
  progressDiv.innerHTML = '<div class="loading">正在初始化分析流程…</div>';

  pollingTimer = setInterval(async () => {
    try{
      const res = await fetch(API+'/api/case/status/'+taskId);
      if(!res.ok) return;
      const status = await res.json();

      const pct = status.progress || 0;
      const step = status.current_step || '处理中';
      const msg = status.message || '';
      const steps = status.step_results || [];

      // Color based on progress
      const barColor = pct < 30 ? 'var(--blue)' : pct < 70 ? 'var(--gold)' : 'var(--green)';
      const barGlow = pct < 30 ? 'rgba(44,82,130,0.3)' : pct < 70 ? 'rgba(168,132,63,0.3)' : 'rgba(74,107,83,0.3)';

      let html = '<div style="text-align:center;padding:16px 0">';

      // ── Circular percentage gauge ──
      const r = 52, circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      html += '<div style="display:inline-block;position:relative;width:130px;height:130px;margin-bottom:12px">';
      html += '<svg width="130" height="130" style="transform:rotate(-90deg)">';
      html += '<circle cx="65" cy="65" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="8"/>';
      html += '<circle cx="65" cy="65" r="'+r+'" fill="none" stroke="'+barColor+'" stroke-width="8"';
      html += ' stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"';
      html += ' style="transition:stroke-dashoffset .6s,stroke .6s;filter:drop-shadow(0 0 6px '+barGlow+')"/>';
      html += '</svg>';
      html += '<div style="position:absolute;inset:0;display:grid;place-items:center">';
      html += '<span style="font-size:36px;font-weight:900;color:'+barColor+';transition:color .6s;line-height:1">'+pct+'</span>';
      html += '<span style="font-size:11px;color:var(--ink2);margin-top:-4px">%</span>';
      html += '</div>';
      html += '</div>';

      // ── Step name ──
      html += '<p style="font-size:15px;font-weight:700;margin:0 0 4px">'+step+'</p>';
      if(msg) html += '<p style="font-size:13px;color:var(--ink2);margin:0 0 12px">'+msg+'</p>';

      html += '</div>';

      // ── Gradient progress bar ──
      html += '<div style="background:var(--line);border-radius:8px;height:12px;overflow:hidden;margin-bottom:16px">';
      html += '<div style="background:linear-gradient(90deg,var(--blue),var(--gold),var(--green));height:100%;width:'+pct+'%;';
      html += 'border-radius:8px;transition:width .6s;box-shadow:0 0 8px '+barGlow+'"></div>';
      html += '</div>';

      // ── Step timeline ──
      if(steps.length > 0){
        html += '<div style="max-height:340px;overflow-y:auto;padding-right:4px">';
        steps.forEach((s, i) => {
          const isLast = i === steps.length - 1;
          const icon = isLast && status.status === 'running' ? '⏳' : '✅';
          const opacity = isLast && status.status === 'running' ? '' : 'opacity:0.7';
          html += '<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;'+opacity+'">';
          html += '<span style="flex-shrink:0;font-size:18px;margin-top:1px">'+icon+'</span>';
          html += '<div style="flex:1;min-width:0">';
          html += '<p style="font-size:14px;font-weight:600;margin:0">'+s.step_name+'</p>';
          if(s.summary) html += '<p style="font-size:12px;color:var(--ink2);margin:2px 0 0;word-break:break-all">'+s.summary+'</p>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      html += '<p style="font-size:12px;color:var(--ink2);margin-top:12px;text-align:center">⏱ 任务在后台执行</p>';

      progressDiv.innerHTML = html;

      if(status.status === 'finished'){
        clearInterval(pollingTimer);
        pollingTimer = null;

        progressDiv.innerHTML = '<div style="text-align:center;padding:24px">'
          + '<div style="display:inline-block;position:relative;width:130px;height:130px;margin-bottom:12px">'
          + '<svg width="130" height="130" style="transform:rotate(-90deg)">'
          + '<circle cx="65" cy="65" r="52" fill="none" stroke="var(--green)" stroke-width="8"/>'
          + '</svg>'
          + '<div style="position:absolute;inset:0;display:grid;place-items:center;font-size:42px">✅</div>'
          + '</div>'
          + '<p style="font-size:15px;font-weight:700;color:var(--green);margin:8px 0">分析完成，正在加载结果…</p>'
          + '</div>';

        const resultRes = await fetch(API+'/api/case/result/'+taskId);
        const resultData = await resultRes.json();

        if(resultData.result){
          const r = resultData.result;
          // Build materialResult for render functions
          if(r.review){
            materialResult = { review: r.review, normalized: r.normalized };
            renderReview(materialResult);
            advanceStage();
            if(r.normalized) renderNormalized(r.normalized);
          }
          // Build workflowResult for render functions
          if(r.jiubufa){
            workflowResult = r.jiubufa;
            advanceStage(); goStage(3);
            renderResults(workflowResult);
          }
        }

        progressDiv.style.display='none';
        if(submitBtn){ submitBtn.textContent='提交审核'; submitBtn.disabled=false; }

        // Show summary
        if(resultData.errors?.length){
          alert('分析完成，但存在以下问题：\n'+resultData.errors.join('\n'));
        }
      }

      if(status.status === 'failed'){
        clearInterval(pollingTimer);
        pollingTimer = null;
        progressDiv.innerHTML = '<div class="error-bar">❌ 分析失败：'+(status.message||'未知错误')+'</div>';
        if(submitBtn){ submitBtn.textContent='提交审核'; submitBtn.disabled=false; }
      }
    }catch(e){
      // Network errors during polling are non-fatal
      console.warn('Polling error:', e);
    }
  }, 3000);
}

// ── Fast Mode ─────────────────────────
async function runFastMode(){
  const raw = document.getElementById('rawMaterial').value.trim();
  if(!raw) return alert('请输入案件材料');
  if(raw.length<50) return alert('材料内容过短，请提供更详细的案件信息以获得准确分析。');

  // 确认
  if(!confirm('快速模式将使用进行一次完整九步法分析，约需2-5分钟。\n\n注意：快速模式不经过材料规范层，建议材料较完整时使用。\n\n是否继续？')) return;

  const btn = document.getElementById('btnFastMode');
  const progress = document.getElementById('fastModeProgress');
  const resultDiv = document.getElementById('fastModeResult');

  // 隐藏其他面板
  document.getElementById('reviewResult').style.display='none';

  btn.textContent='分析中…'; btn.disabled=true;
  progress.style.display='block';
  resultDiv.style.display='none';

  try{
    const t0 = Date.now();
    const res = await fetch(API+'/material/fast-mode',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({raw_material: raw})
    });
    const elapsed = ((Date.now()-t0)/1000).toFixed(1);
    if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.detail||'HTTP '+res.status); }
    const data = await res.json();

    progress.style.display='none';
    resultDiv.style.display='block';
    resultDiv.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="border:none;margin:0;padding:0">⚡ 快速模式分析结果</h2>
          <span class="tag tag-blue">耗时 ${elapsed} 秒</span>
        </div>
        <div class="info-bar" style="margin-bottom:16px">
          ⚠️ 快速模式输出限制较少，内容仅供参考。
        </div>
        <div class="fast-markdown">${renderMarkdown(data.result)}</div>
      </div>`;

    // 滚动到结果
    resultDiv.scrollIntoView({behavior:'smooth'});
  }catch(e){
    progress.style.display='none';
    alert('快速模式分析失败: '+e.message);
  }
  finally{ btn.textContent='⚡ 快速模式'; btn.disabled=false; }
}

function escapeHtml(text){
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// 简易 Markdown → HTML 转换（处理快速模式输出的表格、标题、粗体、列表）
function renderMarkdown(md){
  if(!md) return '';
  let html = escapeHtml(md);

  // 代码块（```...```）
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code)=>`<pre style="background:#f4f2ed;padding:12px;border-radius:6px;overflow-x:auto;font-size:13px;line-height:1.6">${code.trim()}</pre>`);

  // 标题（必须在行首）
  html = html.replace(/^### (.+)$/gm, '<h4 style="font-size:15px;font-weight:700;margin:16px 0 8px;color:#2c5282">$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3 style="font-size:17px;font-weight:700;margin:20px 0 10px;color:#1a1d24;border-bottom:1px solid #e2dcd0;padding-bottom:6px">$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2 style="font-size:20px;font-weight:700;margin:24px 0 12px;color:#9b2a23">$1</h2>');

  // 水平线
  html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #e2dcd0;margin:20px 0">');
  html = html.replace(/^\*\*\*$/gm, '<hr style="border:none;border-top:1px solid #e2dcd0;margin:20px 0">');

  // 粗体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // 无序列表
  html = html.replace(/^- (.+)$/gm, '<li style="margin-left:20px">$1</li>');

  // Markdown 表格：逐行处理
  const lines = html.split('\n');
  const processed = [];
  let inTable = false;
  let tableRows = [];
  let headerSep = false;

  for(let i=0; i<lines.length; i++){
    const line = lines[i].trim();

    // 检测表格行（以 | 开头或以 | 结尾，且包含多个 |）
    if(line.startsWith('|') && line.includes('|')){
      const cells = line.split('|').filter(c => c.trim() !== '');
      // 跳过分隔行 (|---|---|)
      if(cells.every(c => /^[-:]+$/.test(c.trim()))){
        headerSep = true;
        continue;
      }
      if(!inTable){
        inTable = true;
        tableRows = [];
        headerSep = false;
      }
      tableRows.push({cells, isHeader: inTable && tableRows.length===0});
      continue;
    }

    // 非表格行
    if(inTable){
      // 输出表格
      let tbl = '<table style="width:100%;border-collapse:collapse;font-size:14px;margin:12px 0">';
      tableRows.forEach((row,idx)=>{
        const tag = row.isHeader ? 'th' : 'td';
        const style = row.isHeader ? 'font-weight:600;color:#5a5e6a;font-size:12px;text-transform:uppercase;letter-spacing:.05em;background:#f8f5f0' : '';
        tbl += '<tr>';
        row.cells.forEach(c=>{
          tbl += `<${tag} style="padding:8px 12px;border-bottom:1px solid #e2dcd0;text-align:left;${style}">${c.trim()}</${tag}>`;
        });
        tbl += '</tr>';
      });
      tbl += '</table>';
      processed.push(tbl);
      inTable = false;
      tableRows = [];
    }
    processed.push(line);
  }

  // 末尾残留表格
  if(inTable && tableRows.length>0){
    let tbl = '<table style="width:100%;border-collapse:collapse;font-size:14px;margin:12px 0">';
    tableRows.forEach((row,idx)=>{
      const tag = row.isHeader ? 'th' : 'td';
      const style = row.isHeader ? 'font-weight:600;color:#5a5e6a;font-size:12px;background:#f8f5f0' : '';
      tbl += '<tr>';
      row.cells.forEach(c=>{
        tbl += `<${tag} style="padding:8px 12px;border-bottom:1px solid #e2dcd0;text-align:left;${style}">${c.trim()}</${tag}>`;
      });
      tbl += '</tr>';
    });
    tbl += '</table>';
    processed.push(tbl);
  }

  return processed.join('\n');
}

// ── Render Review ───────────────────
function renderReview(data){
  const r = data.review || {};
  const ck = r.case_type_check || {};
  const checklist = ck.checklist || [];
  const coreOk = checklist.filter(i=>i.is_core&&i.status==='已提供').length;
  const coreTotal = checklist.filter(i=>i.is_core).length || 1;
  const pct = Math.round(coreOk/coreTotal*100);
  const cls = pct>=80?'tag-green':pct>=40?'tag-yellow':'tag-red';

  let scHtml = '';
  (r.step_checks||[]).forEach(s=>{
    const icon = {充足:'✅',部分不足:'⚠️',严重缺失:'❌'}[s.status]||'?';
    scHtml += `<div class="accordion"><summary>${icon} Step${s.step_index} ${s.step_name} <span class="tag tag-${s.status==='充足'?'green':s.status==='严重缺失'?'red':'yellow'}">${s.status}</span></summary>
      <div class="body">${s.has_required.length?('<p style="color:green">✓ '+s.has_required.join('；')+'</p>'):''}
      ${s.missing_items.length?('<p style="color:var(--red)">✗ '+s.missing_items.join('；')+'</p>'):''}
      ${s.special_note?('<p style="color:var(--blue);margin-top:6px">💡 '+s.special_note+'</p>'):''}
      ${s.suggestion?('<p style="color:var(--ink2);margin-top:4px">→ '+s.suggestion+'</p>'):''}</div></div>`;
  });

  let clHtml = '';
  checklist.forEach(i=>{
    const icon = {已提供:'s-ok ✓',部分提供:'s-partial ~',缺失:'s-missing ✗'}[i.status]||'s-missing ?';
    clHtml += `<div class="checklist-item"><span class="status-icon ${icon.split(' ')[0]}">${icon.split(' ')[1]}</span><div><strong>${i.name}</strong>${i.is_core?' <span class="tag tag-red" style="font-size:10px">核心</span>':''}<br><span style="font-size:12px;color:var(--ink2)">${i.description}${i.suggestion?' → '+i.suggestion:''}</span></div></div>`;
  });

  document.getElementById('reviewResult').innerHTML = `
    <div class="card">
      <h2>材料审核结果</h2>
      <div class="row" style="margin-bottom:16px">
        <div class="stat"><div class="n">${r.case_module||'—'}</div><div class="l">识别案由</div></div>
        <div class="stat"><div class="n"><span class="${cls}">${pct}%</span></div><div class="l">核心材料提供率</div></div>
        <div class="stat"><div class="n">${r.can_proceed?'✅ 通过':'❌ 未通过'}</div><div class="l">审核判定</div></div>
        <div class="stat"><div class="n">${r.confidence||'—'}</div><div class="l">置信度</div></div>
      </div>
      ${r.can_proceed?'':'<div class="warn-bar">⚠ 材料审核未通过，部分核心材料缺失。您可以选择补充材料或继续分析（结果可能受影响）。</div>'}
      <h3>案由专项材料核对</h3><div>${clHtml}</div>
      ${ck.special_rules_note?('<p style="font-size:13px;color:var(--blue);margin-top:8px">💡 '+ck.special_rules_note+'</p>'):''}
      <h3>九步法逐步骤诊断</h3>${scHtml}
      ${r.upload_instructions?('<h3>补充指引</h3><p style="font-size:14px;white-space:pre-wrap">'+r.upload_instructions+'</p>'):''}
    </div>`;
  document.getElementById('reviewResult').style.display='block';
}

// ── Supplement Modal ─────────────────
function showSupplement(review){
  if(!review){ alert('审核数据异常，请重试'); return; }
  const core = review.missing_core_materials||[];
  const opt = review.missing_optional_materials||[];
  document.getElementById('supplementBody').innerHTML = `
    ${core.length?('<h3 style="color:var(--red)">核心缺失 ('+core.length+'项)</h3><ul style="margin:8px 0 16px 20px">'+core.map(m=>'<li>'+m+'</li>').join('')+'</ul>'):''}
    ${opt.length?('<h3 style="color:var(--warn)">可选缺失 ('+opt.length+'项)</h3><ul style="margin:8px 0 16px 20px">'+opt.slice(0,5).map(m=>'<li>'+m+'</li>').join('')+'</ul>'):''}
    ${review.upload_instructions?('<h3>补充指引</h3><p style="font-size:14px;white-space:pre-wrap;margin-bottom:12px">'+review.upload_instructions+'</p>'):''}
    <label>补充材料内容</label>
    <textarea id="supplementText" placeholder="请在此输入您要补充的材料…" style="min-height:100px;margin-top:4px"></textarea>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-gold" onclick="doSupplement()">补充并重新审核</button>
      <button class="btn btn-ghost" onclick="closeSupplement()">暂不补充，继续分析</button>
    </div>`;
  document.getElementById('supplementModal').classList.add('show');
}
function closeSupplement(){
  document.getElementById('supplementModal').classList.remove('show');
  // Show warning in stage 2
  document.getElementById('stage2Warn').innerHTML = '<div class="warn-bar">⚠ 材料存在缺失，分析结果可能受材料不足影响。<button class="btn btn-sm btn-outline" onclick="document.getElementById(\'supplementModal\').classList.add(\'show\')" style="margin-left:12px">补充材料</button></div>';
}
async function doSupplement(){
  const supp = document.getElementById('supplementText').value.trim();
  if(!supp) return alert('请输入补充材料');
  const orig = document.getElementById('rawMaterial').value.trim();
  const btn = event.target; btn.textContent='审核中…'; btn.disabled=true;
  try{
    const res = await fetch(API+'/material/supplement',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({original:orig, supplement:supp})
    });
    if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.detail||'HTTP '+res.status); }
    const data = await res.json();
    materialResult = data;
    renderReview(data);
    document.getElementById('supplementModal').classList.remove('show');
    if(!data.review) throw new Error('API 返回数据缺少 review 字段');
    if(data.review.can_proceed){ document.getElementById('stage2Warn').innerHTML=''; }
    renderNormalized(data.normalized);
  }catch(e){ alert('补充审核失败: '+e.message); }
  finally{ btn.textContent='补充并重新审核'; btn.disabled=false; }
}

// ── Stage 2: Render Normalized ───────
function renderNormalized(n){
  if(!n){ document.getElementById('normalizedPreview').innerHTML='<div class="warn-bar">⚠ 规范化数据暂不可用，但您仍可继续进行九步法分析（结果可能受影响）。<button class="btn btn-sm btn-outline" onclick="goStage(1)" style="margin-left:12px">← 返回补充材料</button></div>'; return; }
  const bi = n.case_basic_info||{};
  let html = '';
  html += '<div class="row"><div class="field-preview"><span class="key">案件名称</span><div class="val">'+(bi.case_name||'—')+'</div></div><div class="field-preview"><span class="key">案由</span><div class="val">'+(bi.case_cause_text||'—')+'</div></div><div class="field-preview"><span class="key">法院</span><div class="val">'+(bi.court||'—')+'</div></div><div class="field-preview"><span class="key">审理阶段</span><div class="val">'+(bi.procedure_stage||'—')+'</div></div></div>';

  html += '<h3>当事人 ('+(n.party_info||[]).length+')</h3>';
  (n.party_info||[]).forEach(p=>{ html += '<span class="tag tag-blue" style="margin:2px">'+p.party_name+' ('+p.party_role+')</span>'; });

  html += '<h3>诉讼请求 ('+(n.claims||[]).length+')</h3>';
  (n.claims||[]).forEach(c=>{ html += '<div class="field-preview"><span class="key">'+c.claim_id+'</span><div class="val">'+c.claim_text_normalized+(c.amount?' <strong>¥'+c.amount.toLocaleString()+'</strong>':'')+'</div></div>'; });

  html += '<h3>事实主张 ('+(n.claim_facts||[]).length+')</h3>';
  (n.claim_facts||[]).forEach(f=>{ html += '<div class="field-preview"><span class="key">'+f.fact_id+' '+(f.fact_time||'')+'</span><div class="val">'+f.fact_text_original+'</div></div>'; });

  if((n.defense_opinions||[]).length){
    html += '<h3>答辩意见</h3>';
    n.defense_opinions.forEach(d=>{ html += '<span class="tag tag-yellow" style="margin:2px">'+d.defense_id+': '+(d.response_type||'?')+'</span>'; });
  }

  html += '<h3>证据清单 ('+(n.evidence_list||[]).length+')</h3><table><tr><th>名称</th><th>类型</th><th>来源</th><th>证明目的</th></tr>';
  (n.evidence_list||[]).forEach(e=>{ html += '<tr><td>'+e.evidence_name+'</td><td>'+e.evidence_type+'</td><td>'+(e.submitted_by||'—')+'</td><td>'+(e.proof_purpose_normalized||e.proof_purpose_original||'—')+'</td></tr>'; });
  html += '</table>';

  if((n.evidence_meta||[]).length){
    html += '<h3>证据审核 ('+n.evidence_meta.length+')</h3>';
    n.evidence_meta.forEach(em=>{
      html += '<div class="field-preview"><span class="key">'+em.evidence_id+' '+(em.standalone_capable?'✅可单独定案':'⚠不能单独定案')+'</span><div class="val">'+em.subtype+' · '+em.authenticity_note+(em.standalone_limitation?' · '+em.standalone_limitation:'')+'</div></div>';
    });
  }

  if(bi.case_summary) html += '<h3>案件摘要</h3><p style="font-size:14px;color:var(--ink2)">'+bi.case_summary+'</p>';

  document.getElementById('normalizedPreview').innerHTML = html;
}

// ── Stage 2: Run Jiubufa ─────────────
async function runJiubufa(){
  if(!materialResult?.normalized){ return alert('请先完成材料规范化'); }
  const n = materialResult.normalized;
  // Build CaseInput from NormalizedCaseInput (structure is identical)
  const caseInput = {
    case_basic_info: n.case_basic_info,
    party_info: n.party_info,
    claims: n.claims,
    claim_facts: n.claim_facts,
    defense_opinions: n.defense_opinions,
    counterclaims: n.counterclaims||[],
    evidence_list: n.evidence_list,
    cross_examinations: n.cross_examinations||[],
    court_records: n.court_records||[],
    legal_arguments: n.legal_arguments||[],
    procedural_info: n.procedural_info||null,
    existing_judgment_or_mediation: n.existing_judgment_or_mediation||null,
    fallback_user_choice: null
  };

  const btn = document.getElementById('btnJiubufa');
  btn.textContent='分析中…'; btn.disabled=true;
  document.getElementById('jiubufaProgress').style.display='block';
  document.getElementById('jiubufaProgress').innerHTML='<div class="loading">九步法分析进行中，预计需要15-20分钟，请耐心等待…</div>';
  goStage(2);

  try{
    const model = document.getElementById('modelSelect').value;
    const res = await fetch(API+'/api/workflow/run',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({case_input: caseInput, model_name: model})
    });
    const data = await res.json();
    workflowResult = data;
    advanceStage();
    goStage(3);
    renderResults(data);
  }catch(e){
    alert('九步法分析失败: '+e.message);
    document.getElementById('jiubufaProgress').style.display='none';
  }finally{
    btn.textContent='开始九步法分析'; btn.disabled=false;
    document.getElementById('jiubufaProgress').style.display='none';
  }
}

// ── Stage 3: Render Results ──────────
function renderResults(data){
  const steps = [
    {key:'step1', name:'固定权利请求', na:'诉求固定'},
    {key:'step2', name:'请求权基础规范', na:'请求权基础'},
    {key:'step3', name:'抗辩权基础规范', na:'抗辩权基础'},
    {key:'step4', name:'基础规范构成要件分析', na:'要件分析'},
    {key:'step5', name:'诉讼主张检索', na:'待证事实'},
    {key:'step6', name:'争点整理', na:'争点整理'},
    {key:'step7', name:'要件事实证明', na:'举证质证'},
    {key:'step8', name:'事实认定', na:'事实认定'},
    {key:'step9', name:'要件归入并裁判', na:'要件涵摄'}
  ];

  const strong = data.strong_judgment;
  const weak = data.weak_judgment;
  const partial = data.partial_output;
  const score = strong?.sufficiency_score || weak?.sufficiency_score || partial?.sufficiency_score || {};
  const total = score.total || Object.values(score).reduce((a,b)=>a+(typeof b==='number'?b:0), 0);
  const level = total>=80?'低风险':total>=60?'中风险':total>=40?'弱(需用户选择)':'阻断';
  const levelCls = total>=80?'tag-green':total>=60?'tag-yellow':'tag-red';
  const mode = strong?.mode || weak?.mode || partial?.mode || '—';
  const modeLabel = {strong_judgment:'强裁判',weak_judgment:'弱裁判',partial_output_only:'部分输出'}[mode]||mode;

  // Errors & warnings
  let alerts = '';
  if(data.errors?.length) alerts += '<div class="error-bar">❌ '+data.errors.join('；')+'</div>';
  if(data.warnings?.length) alerts += '<div class="warn-bar">⚠ '+data.warnings.join('；')+'</div>';

  // Summary section
  const subs = strong?.subsumption_results || data.step9?.subsumption_results || [];
  const weakSubs = weak?.weak_subsumption_results || [];
  const supported = subs.filter(s=>s.judgment_result==='supported').length;
  const partialSup = subs.filter(s=>s.judgment_result==='partially_supported').length;
  const rejected = subs.filter(s=>s.judgment_result==='rejected').length;

  let summaryHTML = alerts + `
    <div class="card">
      <h2>📜 综合结论</h2>
      <div class="stat-grid">
        <div class="stat"><div class="n"><span class="${levelCls}">${level}</span></div><div class="l">风险等级</div></div>
        <div class="stat"><div class="n">${modeLabel}</div><div class="l">裁判模式</div></div>
        <div class="stat"><div class="n">${total}/100</div><div class="l">材料充足度评分</div></div>
        <div class="stat"><div class="n">${subs.length||weakSubs.length||0}</div><div class="l">裁判结论项</div></div>
      </div>`;

  if(subs.length){
    summaryHTML += '<div style="margin-top:16px"><h3>判决概要</h3>';
    subs.forEach(s=>{
      const label = {supported:'✅ 支持',partially_supported:'⚠ 部分支持',rejected:'❌ 驳回',procedural_dismissal:'↩ 程序性驳回'}[s.judgment_result]||s.judgment_result;
      summaryHTML += '<p>'+label+' '+s.claim_id+'：'+s.reasoning_summary+'</p>';
    });
    summaryHTML += '</div>';
  }

  if(weak?.missing_inputs?.length){
    summaryHTML += '<div class="warn-bar" style="margin-top:12px">⚠ 材料不足提示：'+weak.missing_inputs.join('；')+'</div>';
    if(weak.assumptions_used?.length) summaryHTML += '<div class="info-bar">💡 分析基于以下假设：'+weak.assumptions_used.join('；')+'</div>';
    if(weak.upgrade_to_strong_judgment_requirements?.length) summaryHTML += '<div class="info-bar">📋 升级为强裁判需补充：'+weak.upgrade_to_strong_judgment_requirements.join('；')+'</div>';
  }
  summaryHTML += '</div>';

  // Step cards
  let stepsHTML = '<div class="card"><h2>📊 九步法详细分析</h2>';
  steps.forEach((s,i)=>{
    const output = data[s.key];
    const hasError = (data.errors||[]).some(e=>e.includes(s.key));
    const icon = output?'✅':hasError?'❌':'○';
    const statusTag = output? 'tag-green' : hasError? 'tag-red' : '';
    stepsHTML += `<div class="accordion"><summary>${icon} 第${i+1}步：${s.name} ${statusTag?'<span class="tag '+statusTag+'">'+(output?'已完成':'异常')+'</span>':''}</summary><div class="body">`;

    if(!output){
      stepsHTML += '<p style="color:var(--ink2)">此步骤未产出结果。</p>';
    }else{
      // Show relevant details based on step
      if(i===0) stepsHTML += renderStep1(output);
      else if(i===1) stepsHTML += renderStep2(output);
      else if(i===2) stepsHTML += renderStep3(output);
      else if(i===3) stepsHTML += renderStep4(output);
      else if(i===4) stepsHTML += renderStep5(output);
      else if(i===5) stepsHTML += renderStep6(output);
      else if(i===6) stepsHTML += renderStep7(output);
      else if(i===7) stepsHTML += renderStep8(output);
      else if(i===8) stepsHTML += renderStep9(output);
      stepsHTML += '<details style="margin-top:10px"><summary style="cursor:pointer;font-size:12px;color:var(--ink2)">查看原始JSON</summary><pre>'+JSON.stringify(output,null,2).slice(0,2000)+'</pre></details>';
    }
    stepsHTML += '</div></div>';
  });
  stepsHTML += '</div>';

  // Document skeleton & consistency
  let docHTML = '';
  if(strong?.document_skeleton){
    const sk = strong.document_skeleton;
    docHTML = '<div class="card"><h2>📝 裁判文书框架</h2><div class="document-skeleton">';
    if(sk['原告诉讼请求']) docHTML += '<h3>原告诉讼请求</h3>'+renderClaims(sk['原告诉讼请求']);
    if(sk['被告辩称']) docHTML += '<h3>被告辩称</h3>'+renderDefenses(sk['被告辩称']);
    if(sk['争议焦点']) docHTML += '<h3>争议焦点</h3>'+renderIssues(sk['争议焦点']);
    if(sk['本院查明']) docHTML += '<h3>本院查明</h3>'+renderFactFindings(sk['本院查明']);
    if(sk['本院认为']) docHTML += '<h3>本院认为</h3>'+renderSubsumptions(sk['本院认为']);
    if(sk['判决主文']) docHTML += '<h3>判决主文</h3><div style="font-weight:700;color:var(--red)">'+sk['判决主文'].map(t=>'<p style="text-indent:2em">'+t+'</p>').join('')+'</div>';
    if(sk['引用法条']?.length) docHTML += '<h3>引用法条</h3>'+renderCitedLaws(sk['引用法条']);
    docHTML += '</div></div>';
  }

  // Consistency check
  if(strong?.consistency_check){
    const cc = strong.consistency_check;
    docHTML += '<div class="card"><h2>🔍 一致性校验（八个一致）</h2><table>';
    docHTML += '<tr><td>诉求-固定一致</td><td>'+(cc['诉求-固定一致']?'✅':'❌')+'</td></tr>';
    docHTML += '<tr><td>固定-涵摄一致</td><td>'+(cc['固定-涵摄一致']?'✅':'❌')+'</td></tr>';
    docHTML += '<tr><td>缺漏的诉求</td><td>'+(cc['缺漏的诉求（涵摄阶段未覆盖）']||[]).join(', ')||'无'+'</td></tr>';
    docHTML += '<tr><td>多出的诉求</td><td>'+(cc['多出的诉求（涵摄阶段凭空出现）']||[]).join(', ')||'无'+'</td></tr>';
    docHTML += '<tr><td>争点已使用</td><td>'+(cc['争点已使用']?'✅':'❌')+'</td></tr>';
    docHTML += '<tr><td>事实已认定</td><td>'+(cc['事实已认定']?'✅':'❌')+'</td></tr>';
    docHTML += '<tr><td>法条已引用</td><td>'+(cc['法条已引用']?'✅':'❌')+'</td></tr>';
    docHTML += '</table></div>';
  }

  // Timing
  let timeHTML = '';
  if(data.timings_ms){
    const t = data.timings_ms;
    timeHTML = '<div class="card"><h2>⏱ 运行耗时</h2><table>';
    if(t.total) timeHTML += '<tr><td>总耗时</td><td>'+(t.total/1000).toFixed(1)+'s</td></tr>';
    Object.entries(t).filter(([k])=>k!=='total').forEach(([k,v])=>{ timeHTML += '<tr><td>'+k+'</td><td>'+(v/1000).toFixed(1)+'s</td></tr>'; });
    timeHTML += '</table></div>';
  }

  // Evidence
  let evHTML = '';
  const evList = materialResult?.normalized?.evidence_list || [];
  if(evList.length){
    evHTML = '<div class="card"><h2>📎 证据分析</h2><table><tr><th>名称</th><th>类型</th><th>证明目的</th><th>采信</th></tr>';
    evList.forEach(e=>{ evHTML += '<tr><td>'+e.evidence_name+'</td><td>'+e.evidence_type+'</td><td>'+(e.proof_purpose_normalized||'—')+'</td><td>'+(e.adopted_status||'—')+'</td></tr>'; });
    evHTML += '</table></div>';
  }

  document.getElementById('resultContent').innerHTML = summaryHTML + docHTML + stepsHTML + evHTML + timeHTML;
}

// ── Step render helpers ──────────────
function renderStep1(o){ return '<p>识别案由: '+(o.case_cause_inferred||[]).join(', ')+'</p><p>固定诉请: '+(o.fixed_claims||[]).length+'项</p>'+(o.overall_clarification||[]).map(c=>'<p style="color:var(--blue)">→ '+c+'</p>').join(''); }
function renderStep2(o){ return '<p>请求权基础候选: '+(o.request_basis_candidates||[]).length+'项</p>'+(o.request_basis_candidates||[]).map(r=>'<p>📖 '+r.rule_unit_ref+' <span class="tag tag-blue">'+r.priority+'</span> '+r.selection_reason+'</p>').join(''); }
function renderStep3(o){ return '<p>抗辩权基础候选: '+(o.defense_basis_candidates||[]).length+'项</p>'+(o.defense_basis_candidates||[]).map(d=>'<p>🛡 '+d.response_type+' → '+d.defense_type.join(', ')+' '+(d.rule_unit_ref||'')+'</p>').join(''); }
function renderStep4(o){ return '<p>要件矩阵: '+(o.element_matrix||[]).length+'行</p><table><tr><th>要件</th><th>类型</th><th>举证方</th><th>用途</th></tr>'+(o.element_matrix||[]).slice(0,10).map(e=>'<tr><td>'+e.element_name+'</td><td>'+e.element_type+'</td><td>'+e.burden_party+'</td><td>'+e.used_for+'</td></tr>').join('')+'</table>'; }
function renderStep5(o){ return '<p>主张映射: '+(o.claim_fact_mapping||[]).length+'项</p>'+(o.claim_fact_mapping||[]).map(m=>'<p>'+m.element_id+': <span class="tag tag-'+(m.assertion_status==='asserted'?'green':'red')+'">'+m.assertion_status+'</span> '+(m.clarification_question||'')+'</p>').join(''); }
function renderStep6(o){ return '<p>争点: '+(o.issues||[]).length+'个</p>'+(o.issues||[]).map(i=>'<p>🔴 '+i.issue_text+' <span class="tag">'+i.issue_type+'</span> priority='+i.priority+'</p>').join(''); }
function renderStep7(o){ return '<p>证明计划: '+(o.proof_plan||[]).length+'行</p>'+(o.proof_plan||[]).map(p=>'<p>'+p.fact_to_prove+' — 举证方:'+p.burden_party+(p.proof_gap?' <span style="color:var(--red)">缺口:'+p.proof_gap+'</span>':'')+'</p>').join(''); }
function renderStep8(o){ return '<p>事实认定: '+(o.fact_findings||[]).length+'项</p>'+(o.fact_findings||[]).map(f=>'<p>'+f.fact_finding_id+': <span class="tag tag-'+(f.finding_status==='proved'?'green':f.finding_status==='not_proved'?'red':'yellow')+'">'+f.finding_status+'</span> '+f.reasoning+'</p>').join(''); }
function renderStep9(o){ return '<p>涵摄结果: '+(o.subsumption_results||[]).length+'项</p>'+(o.subsumption_results||[]).map(s=>'<p>'+s.claim_id+': <strong>'+s.judgment_result+'</strong> — '+s.reasoning_summary+'</p><p style="font-size:12px">引用法条: '+(s.cited_rules||[]).join(', ')+'</p>').join(''); }
// ── Document skeleton render helpers ──
function renderClaims(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((c,i)=>{
    const text = c.claim_text_normalized || c.claim_text_original || '';
    const amt = c.amount ? '，标的额 ¥'+Number(c.amount).toLocaleString() : '';
    const claimant = c.claimant ? c.claimant+' ' : '';
    return '<p style="text-indent:2em">'+(i+1)+'. '+claimant+text+amt+'。</p>';
  }).join('');
}
function renderDefenses(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((d,i)=>{
    const text = d.defense_text_original || d.defense_text_normalized || '';
    const resp = d.response_type ? ' <span class="tag tag-yellow">'+d.response_type+'</span>' : '';
    return '<p style="text-indent:2em">'+(i+1)+'. '+text+resp+'</p>';
  }).join('');
}
function renderIssues(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((iss,idx)=>{
    const text = iss.issue_text || '';
    const type = iss.issue_type ? ' <span class="tag tag-blue">'+iss.issue_type+'</span>' : '';
    return '<p style="text-indent:2em">'+(idx+1)+'. '+text+type+'</p>';
  }).join('');
}
function renderFactFindings(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((f,idx)=>{
    const text = f.reasoning || f.fact_finding_id || '';
    const status = f.finding_status || '';
    const cls = status==='proved'?'green':status==='not_proved'?'red':'yellow';
    return '<p style="text-indent:2em">'+(idx+1)+'. '+text+' <span class="tag tag-'+cls+'">'+status+'</span></p>';
  }).join('');
}
function renderCitedLaws(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((law,idx)=>{
    if(typeof law==='string') return '<p style="text-indent:2em">'+(idx+1)+'. '+law+'</p>'; // old format fallback
    const name = law.law_name||'';
    const art = law.article_no||'';
    const text = law.rule_unit_text||'';
    return '<p style="text-indent:2em">'+(idx+1)+'. <strong>'+name+'</strong> '+art+'：'+text+'</p>';
  }).join('');
}
function renderSubsumptions(items){
  if(!items?.length) return '<p>—</p>';
  return items.map((s,idx)=>{
    const result = s.judgment_result || '';
    const summary = s.reasoning_summary || '';
    const label = {supported:'✅ 支持', partially_supported:'⚠ 部分支持', rejected:'❌ 驳回', procedural_dismissal:'↩ 程序性驳回'}[result] || result;
    return '<p style="text-indent:2em">'+(idx+1)+'. <strong>'+label+'</strong>：'+summary+'</p>';
  }).join('');
}
// ── Demo mode ──────────────────────────
let demoMode = false;
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }
function showDemoStatus(text){
  const el = document.getElementById('demoStatus');
  el.style.display = text ? 'block' : 'none';
  el.textContent = text || '';
}
async function runDemo(){
  if(demoMode) return;
  demoMode = true;
  const btn = document.getElementById('btnDemo');
  btn.textContent='播放中…'; btn.disabled=true;
  document.getElementById('sysStatus').className='badge badge-demo';
  document.getElementById('sysStatus').textContent='Demo 模式';
  showDemoStatus('正在加载演示案例数据…');
  try{
    if(typeof DEMO_DATA === 'undefined') throw new Error('Demo 数据未嵌入，请先运行 capture_demo.py 采集');
    const demo = DEMO_DATA;
    // Stage 1: fill textarea + render material review
    document.getElementById('rawMaterial').value = demo.input_text || '';
    showDemoStatus('正在进行材料规范层审核…');
    await delay(600);
    materialResult = { review: demo.material_review, normalized: demo.normalized_material };
    renderReview(materialResult);
    advanceStage(); goStage(2);
    showDemoStatus('正在进行材料结构化处理…');
    await delay(600);
    renderNormalized(demo.normalized_material);
    showDemoStatus('正在执行九步法法律分析…');
    await delay(800);
    // Stage 3: render workflow results
    workflowResult = demo.workflow_result;
    advanceStage(); goStage(3);
    renderResults(workflowResult);
    showDemoStatus('Demo 示例运行完成');
    await delay(2000);
    showDemoStatus('');
  }catch(e){
    alert('Demo 加载失败: '+e.message);
    document.getElementById('sysStatus').className='badge badge-off';
    document.getElementById('sysStatus').textContent='Demo 异常';
    showDemoStatus('');
  }finally{
    demoMode = false;
    btn.textContent='▶ 示例 Demo'; btn.disabled=false;
  }
}
function renderList(items){ if(!items?.length) return '<p>—</p>'; return items.map(i=>'<p>'+(typeof i==='string'?i:JSON.stringify(i))+'</p>').join(''); }
</script>
